<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <radialGradient id="og-glow1" cx="15%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#5e5ce6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5e5ce6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-glow2" cx="85%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#bf5af2" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#bf5af2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-glow3" cx="80%" cy="15%" r="35%">
      <stop offset="0%" stop-color="#0a84ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dot-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a84ff"/>
      <stop offset="50%" stop-color="#5e5ce6"/>
      <stop offset="100%" stop-color="#bf5af2"/>
    </linearGradient>
    <linearGradient id="mark-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a84ff"/>
      <stop offset="50%" stop-color="#5e5ce6"/>
      <stop offset="100%" stop-color="#bf5af2"/>
    </linearGradient>
    <radialGradient id="dot-shine" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background layers -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-glow1)"/>
  <rect width="1200" height="630" fill="url(#og-glow2)"/>
  <rect width="1200" height="630" fill="url(#og-glow3)"/>

  <!-- ============ TOP ROW: brand left, pill right ============ -->
  <g transform="translate(72, 72)">
    <rect width="56" height="56" rx="13" fill="url(#mark-grad)"/>
    <text x="28" y="40"
          font-family="'Inter Display', 'Inter', -apple-system, sans-serif"
          font-weight="800"
          font-size="28"
          letter-spacing="-1.5"
          text-anchor="middle"
          fill="#ffffff">a.</text>
    <text x="76" y="40"
          font-family="'Inter Display', 'Inter', -apple-system, sans-serif"
          font-weight="700"
          font-size="28"
          letter-spacing="-1.4"
          fill="#ffffff">app.</text>
  </g>

  <!-- "from $49/mo" pill (top-right) -->
  <g transform="translate(880, 78)">
    <rect width="200" height="44" rx="22" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <circle cx="22" cy="22" r="5" fill="#30d158"/>
    <text x="42" y="28"
          font-family="'Inter', -apple-system, sans-serif"
          font-weight="600"
          font-size="14"
          letter-spacing="1"
          fill="rgba(255,255,255,0.92)">FROM $49/MO</text>
  </g>

  <!-- ============ CENTER: GIANT "app." MARK ============ -->
  <g transform="translate(600, 360)">
    <text x="-50" y="0"
          font-family="'Inter Display', 'Inter', -apple-system, sans-serif"
          font-weight="800"
          font-size="260"
          letter-spacing="-14"
          text-anchor="middle"
          fill="#ffffff">app</text>
    <circle cx="120" cy="-12" r="52" fill="url(#dot-grad)"/>
    <circle cx="120" cy="-12" r="52" fill="url(#dot-shine)"/>
  </g>

  <!-- ============ TAGLINE ============ -->
  <text x="600" y="450"
        font-family="'Inter Display', 'Inter', -apple-system, sans-serif"
        font-weight="600"
        font-size="34"
        letter-spacing="-1"
        text-anchor="middle"
        fill="#ffffff">We build your app. You run your business.</text>
  <text x="600" y="495"
        font-family="'Inter Display', 'Inter', -apple-system, sans-serif"
        font-weight="500"
        font-size="20"
        letter-spacing="-0.3"
        text-anchor="middle"
        fill="rgba(255,255,255,0.55)">From $49/month. Setup waived. iPhone, Android, desktop.</text>

  <!-- ============ FOOTER URL ============ -->
  <text x="600" y="582"
        font-family="'Inter', ui-monospace, monospace"
        font-weight="500"
        font-size="16"
        letter-spacing="1"
        text-anchor="middle"
        fill="rgba(255,255,255,0.38)">app.nepa-pro.com</text>
</svg>
